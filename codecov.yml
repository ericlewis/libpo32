codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 100%

comment:
  layout: "diff, files, components"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true
  hide_project_coverage: false

component_management:
  individual_components:
    - component_id: transfer_core
      name: transfer core
      paths:
        - src/po32.c
    - component_id: patch_import
      name: patch importer
      paths:
        - src/po32_patch_import.c
    - component_id: synth
      name: synth
      paths:
        - src/po32_synth.c
    - component_id: lookup_tables
      name: lookup tables
      paths:
        - src/po32_lut.h
        - src/po32_synth_tables.h

github_checks:
  annotations: false
